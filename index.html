<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SOHBY STORE</title>
    <style>
        :root { --baby: #89CFF0; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: #fff; text-align: center; }
        h1, h2, h3 { color: var(--baby); }

        /* Order Modal */
        #orderModal { display: none; position: fixed; top: 20%; left: 10%; width: 80%; background: #222; padding: 20px; border: 2px solid var(--baby); border-radius: 15px; z-index: 999; }
        .modal-input { display: block; width: 100%; margin: 10px 0; padding: 10px; border-radius: 5px; border: 1px solid var(--baby); background: #000; color: #fff; }
        
        /* Store & Admin Styles */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding: 20px; }
        .card { border: 2px solid var(--baby); padding: 15px; border-radius: 15px; }
        button { background: var(--baby); color: #000; border: none; padding: 10px; cursor: pointer; font-weight: bold; border-radius: 5px; margin: 5px; }
        
        .order-card { border: 1px solid var(--baby); padding: 10px; margin: 10px; border-radius: 10px; text-align: left; }
        .order-card p { margin: 5px 0; }
        .label { color: var(--baby); font-weight: bold; }
    </style>
</head>
<body>

    <h1>SOHBY STORE</h1>
    <div class="grid" id="storeGrid"></div>

    <!-- Modal Form -->
    <div id="orderModal">
        <h3 style="color:var(--baby)">Complete Your Order</h3>
        <input type="text" id="cName" class="modal-input" placeholder="Name">
        <input type="text" id="cPhone" class="modal-input" placeholder="Phone Number">
        <input type="text" id="cAddr" class="modal-input" placeholder="Address">
        <button onclick="saveOrder()">Confirm Order</button>
        <button onclick="document.getElementById('orderModal').style.display='none'">Cancel</button>
    </div>

    <div id="adminPanel" style="display:none; padding:20px; border:1px solid var(--baby); margin-top:50px;">
        <h2 style="color:var(--baby)">ADMIN PANEL</h2>
        <div id="ordersList"></div>
    </div>
    
    <div onclick="requestAdmin()" style="cursor:pointer; color:transparent;">.</div>

    <script>
        let currentProduct = {};

        function loadStore() {
            let products = JSON.parse(localStorage.getItem('myProducts')) || [];
            document.getElementById('storeGrid').innerHTML = products.map((p, i) => `
                <div class="card">
                    <img src="${p.img}" style="width:100%; height:150px; object-fit:contain;">
                    <h3>${p.name}</h3>
                    <p style="color:var(--baby)">${p.price} EGP</p>
                    <button onclick="openModal('${p.name}', ${p.price})">ORDER NOW</button>
                </div>
            `).join('');
        }

        function openModal(name, price) {
            currentProduct = {name, price};
            document.getElementById('orderModal').style.display = 'block';
        }

        function saveOrder() {
            let order = {
                name: document.getElementById('cName').value,
                phone: document.getElementById('cPhone').value,
                addr: document.getElementById('cAddr').value,
                prod: currentProduct.name
            };
            let orders = JSON.parse(localStorage.getItem('orders')) || [];
            orders.push(order);
            localStorage.setItem('orders', JSON.stringify(orders));
            alert("Order placed!");
            document.getElementById('orderModal').style.display = 'none';
        }

        function requestAdmin() {
            if(prompt("Password:") === "ana mahmoud") {
                document.getElementById('adminPanel').style.display = 'block';
                let orders = JSON.parse(localStorage.getItem('orders')) || [];
                document.getElementById('ordersList').innerHTML = orders.map(o => `
                    <div class="order-card">
                        <p><span class="label">Name:</span> ${o.name}</p>
                        <p><span class="label">Phone:</span> ${o.phone}</p>
                        <p><span class="label">Address:</span> ${o.addr}</p>
                        <p><span class="label">Product:</span> ${o.prod}</p>
                    </div>
                `).join('');
            }
        }
        loadStore();
    </script>
</body>
</html>
