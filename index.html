<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SOHBY STORE</title>
    <style>
        :root { --baby: #89CFF0; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: var(--baby); text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding: 20px; }
        .card { border: 2px solid var(--baby); padding: 15px; border-radius: 15px; background: #111; }
        #orderFrame, #adminPanel { display: none; border: 2px solid var(--baby); padding: 20px; width: 320px; margin: 20px auto; border-radius: 15px; background: #111; }
        input, select { display: block; width: 100%; margin: 10px 0; padding: 10px; background: #000; color: var(--baby); border: 1px solid var(--baby); }
        button { background: var(--baby); color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 5px; }
        .order-box { border: 1px solid var(--baby); padding: 10px; margin: 10px; text-align: left; }
    </style>
</head>
<body>
    <h1>SOHBY STORE</h1>
    <div class="grid" id="storeGrid"></div>

    <!-- نافذة طلب الزبون -->
    <div id="orderFrame">
        <h3>ORDER DETAILS</h3>
        <input type="text" id="cName" placeholder="Name">
        <input type="text" id="cPhone" placeholder="Phone">
        <select id="cSize">
            <option value="S">S</option><option value="M">M</option><option value="L">L</option><option value="XL">XL</option><option value="2XL">2XL</option><option value="3XL">3XL</option><option value="4XL">4XL</option>
        </select>
        <input type="number" id="cQty" value="1" min="1">
        <button onclick="saveOrder()">CONFIRM</button>
    </div>

    <!-- لوحة الأدمين -->
    <div id="adminPanel">
        <h2>ADMIN PANEL</h2>
        <input type="text" id="pName" placeholder="Name">
        <input type="text" id="pImg" placeholder="Image URL">
        <input type="number" id="pPrice" placeholder="Price">
        <button onclick="addProduct()">Add Product</button>
        <hr>
        <div id="ordersList"></div>
        <button onclick="document.getElementById('adminPanel').style.display='none'">CLOSE</button>
    </div>
    <div onclick="requestAdmin()" style="cursor:pointer; color:#333; margin-top:50px;">.</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const db = getFirestore(initializeApp({ /* حط الـ config بتاعك هنا تاني */ }));

        // تحميل المنتجات
        window.loadStore = async () => {
            const snap = await getDocs(collection(db, "products"));
            document.getElementById('storeGrid').innerHTML = "";
            snap.forEach((d) => {
                const p = d.data();
                document.getElementById('storeGrid').innerHTML += `
                    <div class="card">
                        <h3>${p.name}</h3>
                        <img src="${p.image}" style="width:100%; height:150px; object-fit:contain;">
                        <p>Price: ${p.price} EGP</p>
                        <button onclick="showOrder('${p.name}')">ORDER</button>
                        <button onclick="deleteProduct('${d.id}')" style="background:red;">Delete</button>
                    </div>`;
            });
        };

        // حفظ طلب الزبون
        window.saveOrder = async () => {
            await addDoc(collection(db, "orders"), {
                name: document.getElementById('cName').value,
                phone: document.getElementById('cPhone').value,
                size: document.getElementById('cSize').value,
                qty: document.getElementById('cQty').value,
                product: currentP
            });
            alert("Order Sent!");
            document.getElementById('orderFrame').style.display = 'none';
        };

        // تحميل الطلبات للأدمين
        window.requestAdmin = async () => {
            if(prompt("Password:") === "ana mahmoud") {
                document.getElementById('adminPanel').style.display = 'block';
                const snap = await getDocs(collection(db, "orders"));
                document.getElementById('ordersList').innerHTML = "";
                snap.forEach(d => {
                    const o = d.data();
                    document.getElementById('ordersList').innerHTML += `<div class="order-box">${o.name} | ${o.product} | ${o.size} | Qty: ${o.qty}</div>`;
                });
            }
        };

        window.addProduct = async () => {
            await addDoc(collection(db, "products"), { name: document.getElementById('pName').value, image: document.getElementById('pImg').value, price: document.getElementById('pPrice').value });
            loadStore();
        };

        window.deleteProduct = async (id) => { await deleteDoc(doc(db, "products", id)); loadStore(); };
        window.showOrder = (name) => { currentP = name; document.getElementById('orderFrame').style.display = 'block'; };
        
        let currentP = "";
        loadStore();
    </script>
</body>
</html>
