<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SOHBY STORE</title>
    <style>
        :root { --baby: #89CFF0; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: var(--baby); text-align: center; }
        
        /* Intro Screen */
        #introScreen { 
            position:fixed; top:0; left:0; width:100%; height:100%; 
            background:var(--bg); z-index:20000; 
            display:flex; flex-direction:column; justify-content:center; align-items:center;
            transition: opacity 1s ease;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; padding: 20px; }
        .card { border: 2px solid var(--baby); padding: 20px; border-radius: 20px; background: #111; cursor: pointer; }
        .card img { width: 100%; height: 250px; object-fit: cover; border-radius: 10px; transition: transform 0.3s; }
        .card:hover img { transform: scale(1.05); }
        
        #productDetails { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:10000; padding:20px; overflow-y:auto; }
        .details-box { max-width: 600px; margin: auto; }
        
        #orderFrame, #adminPanel { display: none; border: 2px solid var(--baby); padding: 20px; width: 350px; margin: 20px auto; border-radius: 15px; background: #111; }
        input, select { display: block; width: 100%; margin: 10px 0; padding: 12px; background: #000; color: var(--baby); border: 1px solid var(--baby); }
        button { background: var(--baby); color: #000; border: none; padding: 12px 25px; cursor: pointer; font-weight: bold; border-radius: 5px; }
        .order-box { border: 1px solid var(--baby); padding: 15px; margin: 10px; text-align: left; font-size: 14px; }
    </style>
</head>
<body>

    <!-- Intro Screen -->
    <div id="introScreen">
        <h1 style="font-size: 60px; color: var(--baby); margin-bottom: 30px;">SOHBY STORE</h1>
        <button onclick="closeIntro()" style="font-size: 20px; padding: 15px 50px;">SHOP NOW</button>
    </div>

    <h1>SOHBY STORE</h1>
    <div class="grid" id="storeGrid"></div>

    <!-- Product Details -->
    <div id="productDetails">
        <button onclick="document.getElementById('productDetails').style.display='none'" style="float:right;">CLOSE X</button>
        <div id="detailsContent" class="details-box"></div>
    </div>

    <!-- Order Form -->
    <div id="orderFrame">
        <h3>COMPLETE YOUR ORDER</h3>
        <input type="text" id="cName" placeholder="Full Name">
        <input type="text" id="cPhone" placeholder="Phone Number">
        <input type="number" id="cQty" placeholder="Quantity" value="1" min="1">
        <button onclick="saveOrder()">CONFIRM ORDER</button>
        <button onclick="document.getElementById('orderFrame').style.display='none'">CANCEL</button>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel">
        <h2>ADMIN PANEL</h2>
        <input type="text" id="pName" placeholder="Product Name">
        <input type="text" id="pImg" placeholder="Image URL">
        <input type="number" id="pPrice" placeholder="Price (EGP)">
        <button onclick="addProduct()">Add Product</button>
        <hr> <h3>PRODUCTS</h3> <div id="adminProductsList"></div>
        <hr> <h3>ORDERS</h3> <div id="ordersList"></div>
        <button onclick="document.getElementById('adminPanel').style.display='none'">CLOSE</button>
    </div>
    
    <div onclick="requestAdmin()" style="cursor:pointer; color:#333; margin-top:50px;">.</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const db = getFirestore(initializeApp({
            apiKey: "AIzaSyD8Wzyms3RkxS3ap0prqR0CVzgqn_rzAX0",
            authDomain: "sohbystore-db53c.firebaseapp.com",
            projectId: "sohbystore-db53c",
            storageBucket: "sohbystore-db53c.firebasestorage.app",
            messagingSenderId: "277244939743",
            appId: "1:277244939743:web:da07b858d3d5cb9527486a",
            measurementId: "G-0TBH7D37GS"
        }));

        let currentP = "";
        let selectedSize = "M";

        // Functions
        window.closeIntro = () => {
            const intro = document.getElementById('introScreen');
            intro.style.opacity = '0';
            setTimeout(() => { intro.style.display = 'none'; }, 1000);
        };

        window.loadStore = async () => {
            const snap = await getDocs(collection(db, "products"));
            document.getElementById('storeGrid').innerHTML = "";
            snap.forEach((d) => {
                const p = d.data();
                document.getElementById('storeGrid').innerHTML += `
                    <div class="card" onclick="showDetails('${p.name}', '${p.image}', '${p.price}')">
                        <img src="${p.image}">
                        <h3>${p.name}</h3>
                        <p>Price: ${p.price} EGP</p>
                    </div>`;
            });
        };

        window.showDetails = (name, img, price) => {
            currentP = name;
            document.getElementById('detailsContent').innerHTML = `
                <img src="${img}" style="width:100%; border-radius:20px; margin-top:20px;">
                <h1>${name}</h1>
                <p style="font-size:24px; color:#fff;">Price: ${price} EGP</p>
                <h4 style="margin:20px 0;">Select Size:</h4>
                <select id="sizeSelector" onchange="selectedSize = this.value">
                    <option value="S">S</option><option value="M" selected>M</option><option value="L">L</option><option value="XL">XL</option><option value="2XL">2XL</option><option value="3XL">3XL</option><option value="4XL">4XL</option>
                </select>
                <button onclick="document.getElementById('productDetails').style.display='none'; document.getElementById('orderFrame').style.display='block';" style="width:100%; margin-top:20px;">BUY NOW</button>
            `;
            document.getElementById('productDetails').style.display = 'block';
        };

        window.saveOrder = async () => {
            await addDoc(collection(db, "orders"), {
                name: document.getElementById('cName').value,
                phone: document.getElementById('cPhone').value,
                size: selectedSize,
                qty: document.getElementById('cQty').value,
                product: currentP
            });
            alert("Order Confirmed!");
            document.getElementById('orderFrame').style.display = 'none';
        };

        window.requestAdmin = async () => {
            if(prompt("Password:") === "ana mahmoud") {
                document.getElementById('adminPanel').style.display = 'block';
                const snapP = await getDocs(collection(db, "products"));
                document.getElementById('adminProductsList').innerHTML = "";
                snapP.forEach(d => {
                    const p = d.data();
                    document.getElementById('adminProductsList').innerHTML += `
                        <div style="border:1px solid #89CFF0; margin:5px; padding:5px;">
                            ${p.name} <button onclick="deleteProduct('${d.id}')" style="background:red; color:white;">Delete</button>
                        </div>`;
                });
                const snapO = await getDocs(collection(db, "orders"));
                document.getElementById('ordersList').innerHTML = "";
                snapO.forEach(d => {
                    const o = d.data();
                    document.getElementById('ordersList').innerHTML += `<div class="order-box">User: ${o.name} | Phone: ${o.phone} | Product: ${o.product} | Size: ${o.size} | Qty: ${o.qty}</div>`;
                });
            }
        };

        window.addProduct = async () => {
            await addDoc(collection(db, "products"), { name: document.getElementById('pName').value, image: document.getElementById('pImg').value, price: document.getElementById('pPrice').value });
            requestAdmin(); loadStore();
        };

        window.deleteProduct = async (id) => { await deleteDoc(doc(db, "products", id)); requestAdmin(); loadStore(); };
        
        loadStore();
    </script>
</body>
</html>
